<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Form Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1e293b; color: white; }
        .form-group { margin: 20px 0; }
        .form-input, .form-checkbox { padding: 10px; margin: 5px 0; }
        .setup-button { 
            padding: 15px 30px; 
            background: #666; 
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 8px;
            opacity: 0.6;
        }
        .setup-button:not(:disabled) { 
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); 
            opacity: 1;
        }
    </style>
</head>
<body>
    <h1>Setup Form Debug Test</h1>
    
    <div class="form-group">
        <label>Name:</label>
        <input type="text" id="user-name" class="form-input" placeholder="Enter your name">
    </div>
    
    <div class="form-group">
        <label>
            <input type="checkbox" id="privacy-agree" class="form-checkbox">
            I agree to Privacy Policy
        </label>
    </div>
    
    <div class="form-group">
        <label>
            <input type="checkbox" id="tos-agree" class="form-checkbox">
            I agree to Terms of Service
        </label>
    </div>
    
    <button type="button" class="setup-button" id="setup-submit" disabled>
        Get Started
    </button>
    
    <div id="debug-output" style="margin-top: 20px; padding: 10px; background: #0f172a; border-radius: 8px;">
        <h3>Debug Output:</h3>
        <div id="debug-text">Page loaded...</div>
    </div>

    <script>
        function log(message) {
            const debugText = document.getElementById('debug-text');
            debugText.innerHTML += '<br>' + message;
            console.log(message);
        }

        function validateSetupForm() {
            log('validateSetupForm() called');
            
            const nameField = document.getElementById('user-name');
            const privacyBox = document.getElementById('privacy-agree');
            const tosBox = document.getElementById('tos-agree');
            const submitButton = document.getElementById('setup-submit');
            
            if (!nameField || !privacyBox || !tosBox || !submitButton) {
                log('❌ Setup form elements not found');
                return;
            }
            
            const nameValid = nameField.value.trim().length > 0;
            const privacyValid = privacyBox.checked;
            const tosValid = tosBox.checked;
            
            log(`Name valid: ${nameValid}, Privacy: ${privacyValid}, ToS: ${tosValid}`);
            
            const allValid = nameValid && privacyValid && tosValid;
            
            submitButton.disabled = !allValid;
            
            if (allValid) {
                submitButton.style.opacity = '1';
                submitButton.style.cursor = 'pointer';
                submitButton.style.background = 'linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%)';
                log('✅ Button enabled');
            } else {
                submitButton.style.opacity = '0.6';
                submitButton.style.cursor = 'not-allowed';
                submitButton.style.background = '#666';
                log('❌ Button disabled');
            }
        }

        function completeSetupProcess() {
            log('🚀 completeSetupProcess() called - SUCCESS!');
            alert('Setup completed successfully!');
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', function() {
            log('DOM loaded, setting up event listeners...');
            
            const nameField = document.getElementById('user-name');
            const privacyBox = document.getElementById('privacy-agree');
            const tosBox = document.getElementById('tos-agree');
            const submitButton = document.getElementById('setup-submit');
            
            if (nameField && privacyBox && tosBox && submitButton) {
                log('✅ All elements found, adding listeners');
                
                nameField.addEventListener('input', validateSetupForm);
                privacyBox.addEventListener('change', validateSetupForm);
                tosBox.addEventListener('change', validateSetupForm);
                submitButton.addEventListener('click', completeSetupProcess);
                
                log('✅ Event listeners added');
                validateSetupForm(); // Initial validation
            } else {
                log('❌ Some elements not found');
            }
        });
    </script>
</body>
</html>
